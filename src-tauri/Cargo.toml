[package]
name = "devtools-app"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "devtools_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-clipboard-manager = "2.3.2"

# HRN-02 automation spike (D-01). Embedded W3C WebDriver server for driving the
# real WKWebView in tests. Registered behind #[cfg(debug_assertions)] in lib.rs
# so it is compiled out of release builds entirely.
tauri-plugin-webdriver = "0.2"
