<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DevTools — Protobuf Decoder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-app: #0a0b0d;
    --win: #15171c;
    --titlebar: #1b1e24;
    --sidebar: #101216;
    --pane: #14161b;
    --panel: #181b21;
    --input-bg: #0d0f13;
    --card: #181b21;
    --card-2: #1c2027;
    --bd: rgba(255,255,255,0.07);
    --bd-2: rgba(255,255,255,0.12);
    --tx: #e7e9ee;
    --tx-2: #989da7;
    --tx-3: #686d77;
    --accent: #3b82f6;
    --accent-soft: color-mix(in srgb, var(--accent) 15%, transparent);
    --accent-line: color-mix(in srgb, var(--accent) 75%, transparent);
    --ok: #34d399;
    --bad: #f0876b;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    /* density (comfortable default) */
    --pad: 28px;
    --gap: 16px;
    --fhead-gap: 12px;
    --field-pad: 15px;
    --fs: 14px;
    --row-gap: 11px;
  }
  [data-density="compact"] {
    --pad: 18px; --gap: 11px; --fhead-gap: 9px; --field-pad: 10px; --fs: 13px; --row-gap: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(120% 90% at 50% -10%, #14161c 0%, var(--bg-app) 60%);
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    color: var(--tx);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 32px; gap: 16px;
    -webkit-font-smoothing: antialiased;
  }
  kbd {
    font-family: var(--mono); font-size: 11px; color: var(--tx-2);
    background: rgba(255,255,255,0.05); border: 1px solid var(--bd);
    border-radius: 5px; padding: 2px 6px; line-height: 1;
  }

  /* ---------- window ---------- */
  .window {
    width: min(1180px, 100%); height: min(760px, calc(100vh - 110px));
    background: var(--win); border: 1px solid var(--bd-2);
    border-radius: 13px; overflow: hidden;
    box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 40px 90px -20px rgba(0,0,0,0.75), 0 8px 24px rgba(0,0,0,0.4);
    display: flex; flex-direction: column;
  }
  .titlebar {
    height: 44px; flex: none; background: var(--titlebar);
    border-bottom: 1px solid var(--bd); display: grid;
    grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 16px;
  }
  .lights { display: flex; gap: 8px; }
  .lights i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .lights i:nth-child(1) { background: #f25f57; }
  .lights i:nth-child(2) { background: #fabc2e; }
  .lights i:nth-child(3) { background: #28c840; }
  .title { text-align: center; font-size: 13px; font-weight: 600; color: var(--tx-2); letter-spacing: .2px; }
  .body { flex: 1; display: flex; min-height: 0; }

  /* ---------- sidebar ---------- */
  .sidebar { width: 268px; flex: none; background: var(--sidebar); border-right: 1px solid var(--bd);
    display: flex; flex-direction: column; padding: 14px; gap: 12px; transition: width .18s ease; }
  .sidebar.mode-icons { width: 66px; padding: 14px 10px; align-items: stretch; }
  .search { display: flex; align-items: center; gap: 9px; background: var(--input-bg);
    border: 1px solid var(--bd); border-radius: 9px; padding: 0 10px; height: 38px; }
  .search-i { color: var(--tx-3); flex: none; }
  .search input { flex: 1; background: none; border: none; outline: none; color: var(--tx);
    font-family: inherit; font-size: 13px; min-width: 0; }
  .search input::placeholder { color: var(--tx-3); }
  .sidebar.mode-icons .search { padding: 0; justify-content: center; }
  .sidebar.mode-icons .search input, .sidebar.mode-icons .search kbd { display: none; }

  .navlist { display: flex; flex-direction: column; gap: 2px; }
  .navitem { position: relative; display: flex; align-items: center; gap: 12px;
    background: none; border: none; border-radius: 9px; padding: 10px 11px; cursor: pointer;
    text-align: left; color: var(--tx-2); width: 100%; transition: background .12s; }
  .navitem:hover { background: rgba(255,255,255,0.035); }
  .navbar-accent { position: absolute; left: 3px; top: 50%; transform: translateY(-50%) scaleY(0);
    width: 3px; height: 56%; border-radius: 3px; background: var(--accent); transition: transform .15s; }
  .navitem.on { background: var(--accent-soft); }
  .navitem.on .navbar-accent { transform: translateY(-50%) scaleY(1); }
  .navitem.on .navname { color: var(--tx); }
  .navitem.on .navicon { color: var(--accent); }
  .navicon { color: var(--tx-2); flex: none; }
  .navtext { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .navname { font-size: 13.5px; font-weight: 600; color: var(--tx); white-space: nowrap; }
  .navdesc { font-size: 11.5px; color: var(--tx-3); line-height: 1.35; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  /* one-line: icon + name, no description */
  .sidebar.mode-compact .navitem { padding: 8px 11px; }
  .sidebar.mode-compact .navdesc { display: none; }
  /* icon only */
  .sidebar.mode-icons .navitem { justify-content: center; padding: 11px 0; }
  .sidebar.mode-icons .navtext { display: none; }
  .sidebar.mode-icons .navbar-accent { left: 0; }

  .pro-block { margin-top: auto; border-top: 1px solid var(--bd); padding-top: 12px; }
  .pro-head { display: flex; align-items: center; justify-content: space-between;
    padding: 0 6px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--tx-3); }
  .pro-pill { display: inline-flex; align-items: center; gap: 4px; color: var(--accent);
    background: var(--accent-soft); border-radius: 5px; padding: 2px 6px; font-size: 10px; letter-spacing: .04em; }
  .pro-pill svg { width: 11px; height: 11px; }
  .navitem.pro { opacity: .62; cursor: default; }
  .sidebar.mode-icons .pro-block .pro-head { display: none; }

  /* ---------- main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--pane); }
  .toolhead { display: flex; align-items: flex-start; justify-content: space-between;
    padding: var(--pad) var(--pad) 0; gap: 16px; }
  .th-left h1 { font-size: 19px; font-weight: 600; letter-spacing: -.01em; }
  .th-left p { font-size: 12.5px; color: var(--tx-3); margin-top: 3px; white-space: nowrap; }
  .th-right { display: flex; align-items: center; gap: 9px; flex: none; }
  .fmt { font-family: var(--mono); font-size: 13px; color: var(--tx); background: var(--panel);
    border: 1px solid var(--bd-2); border-radius: 8px; padding: 7px 10px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px; }
  .fmt svg { color: var(--tx-3); }
  .palette-trigger { background: var(--panel); border: 1px solid var(--bd); border-radius: 8px;
    padding: 6px 8px; cursor: pointer; }
  .palette-trigger kbd { background: none; border: none; padding: 0; color: var(--tx-2); }
  .proto-btn { display: inline-flex; align-items: center; gap: 7px; background: none;
    border: 1px dashed var(--bd-2); color: var(--tx-2); border-radius: 8px; padding: 7px 11px;
    font-family: inherit; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .proto-btn svg { width: 13px; height: 13px; color: var(--tx-3); }
  .proto-btn .tag { font-size: 10px; color: var(--accent); background: var(--accent-soft);
    border-radius: 4px; padding: 1px 5px; letter-spacing: .03em; }

  /* ---------- workspace (resizable look) ---------- */
  .workspace { flex: 1; display: grid; grid-template-columns: 1fr 7px 1.05fr;
    gap: 0; padding: 18px var(--pad) 0; min-height: 0; }
  .divider { align-self: stretch; display: flex; align-items: center; justify-content: center; cursor: col-resize; }
  .divider span { width: 3px; height: 34px; border-radius: 3px; background: var(--bd-2); }
  .divider:hover span { background: var(--accent-line); }

  .pane { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  .pane-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
  .pane-label { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--tx-3); font-weight: 600; white-space: nowrap; }
  .input-foot span { white-space: nowrap; }
  .examples { display: flex; gap: 6px; }
  .ex { font-family: var(--mono); font-size: 11px; color: var(--tx-3); background: var(--input-bg);
    border: 1px solid var(--bd); border-radius: 6px; padding: 3px 8px; cursor: pointer; white-space: nowrap; }
  .ex.on { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }

  .scroll { overflow: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.14) transparent; }
  .scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 9px; border: 2px solid transparent; background-clip: padding-box; }

  /* input */
  .input-pane { }
  .hexbox { flex: 1; background: var(--input-bg); border: 1px solid var(--bd); border-radius: 11px;
    padding: 16px; min-height: 0; }
  .hexbox:focus-within, .input-pane:hover .hexbox { border-color: var(--bd-2); }
  .hexgrid { display: flex; flex-wrap: wrap; gap: 4px 9px; font-family: var(--mono);
    font-size: 15px; color: var(--tx); align-content: flex-start; }
  .byte { letter-spacing: .04em; }
  .caret { width: 2px; height: 19px; background: var(--accent); animation: blink 1.1s steps(1) infinite; align-self: center; }
  @keyframes blink { 50% { opacity: 0; } }
  .input-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
    font-family: var(--mono); font-size: 11.5px; color: var(--tx-3); }

  /* decoded */
  .decoded { flex: 1; min-height: 0; padding-right: 2px; }
  .tree-cards { display: flex; flex-direction: column; gap: var(--gap); }
  .tree-rows { display: flex; flex-direction: column; }

  .field { position: relative; }
  .tree-cards .field { background: var(--card); border: 1px solid var(--bd); border-radius: 11px; padding: var(--field-pad); }
  .tree-cards .field.d1 { background: var(--card-2); }
  .tree-rows .field { border-bottom: 1px solid var(--bd); padding: var(--row-gap) 2px; }
  .tree-rows .field:last-child { border-bottom: none; }
  .field-head { display: flex; align-items: center; gap: var(--fhead-gap); margin-bottom: 9px; }
  .tree-rows .field-head { margin-bottom: 6px; }
  .fnum { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
  .wire { font-family: var(--mono); font-size: 11.5px; color: var(--tx-2); background: rgba(255,255,255,0.05);
    border-radius: 5px; padding: 2px 7px; }
  .meta { font-size: 11.5px; color: var(--tx-3); }
  .field-bytes { font-family: var(--mono); font-size: 11.5px; color: var(--tx-3); margin-left: auto;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  [data-copy="hover"] .field-bytes { margin-right: 4px; }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tree-rows .chips { margin-bottom: 6px; }
  .chip { font-family: var(--mono); font-size: 12px; color: var(--tx-2); background: var(--input-bg);
    border: 1px solid var(--bd); border-radius: 7px; padding: 3px 9px; cursor: pointer; transition: all .12s; }
  .chip:hover:not(:disabled) { border-color: var(--bd-2); color: var(--tx); }
  .chip.on { color: var(--accent); background: var(--accent-soft);
    border-color: var(--accent-line); font-weight: 600; }
  .chip:disabled { opacity: .4; cursor: not-allowed; }

  .val { font-family: var(--mono); font-size: var(--fs); color: var(--tx); padding: 7px 11px;
    background: var(--input-bg); border-radius: 8px; }
  .tree-rows .val { background: none; padding: 3px 0 0; }
  .val.bad { color: var(--bad); }
  .submsg { margin-top: 4px; padding-left: 14px; border-left: 2px solid var(--accent-line);
    display: flex; flex-direction: column; gap: 10px; }
  .tree-rows .submsg { padding-left: 12px; }

  /* copy affordances */
  .copy-btn { background: var(--input-bg); border: 1px solid var(--bd); border-radius: 7px;
    width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center;
    color: var(--tx-2); cursor: pointer; flex: none; transition: all .12s; }
  .copy-btn:hover { color: var(--tx); border-color: var(--bd-2); }
  .copy-btn.is-hover { opacity: 0; }
  .field:hover .copy-btn.is-hover, .pane-top:hover .copy-btn.is-hover { opacity: 1; }
  .copy-inline { background: none; border: none; color: var(--accent); font-family: var(--mono);
    font-size: 11px; cursor: pointer; margin-left: 8px; text-decoration: underline; text-underline-offset: 2px; opacity: .85; }
  .field-head .copy-inline { margin-left: 0; }

  /* json view */
  .json { font-family: var(--mono); font-size: var(--fs); line-height: 1.7; padding: 6px 4px; }
  .jline { white-space: pre; }
  .jbrace { color: var(--tx-2); }
  .jkey { color: var(--accent); }
  .jcolon { color: var(--tx-3); }
  .jval { color: #9ed8a6; }
  .jtype { color: var(--tx-3); font-style: normal; opacity: .7; }

  /* ---------- status bar ---------- */
  .statusbar { height: 38px; flex: none; border-top: 1px solid var(--bd); background: var(--titlebar);
    display: flex; align-items: center; justify-content: space-between; padding: 0 var(--pad);
    font-family: var(--mono); font-size: 11.5px; color: var(--tx-3); overflow: hidden; }
  .statusbar span { white-space: nowrap; }
  .st-left, .st-right { display: flex; align-items: center; gap: 11px; }
  .st-ok { display: inline-flex; align-items: center; gap: 6px; color: var(--ok); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 7px var(--ok); }
  .st-sep { width: 1px; height: 11px; background: var(--bd-2); }
  .st-time { color: var(--tx-2); }
  .st-pro { display: inline-flex; align-items: center; gap: 4px; color: var(--accent); }
  .st-pro svg { width: 11px; height: 11px; }
  .st-kbd kbd { font-size: 10px; }

  /* ---------- command palette ---------- */
  .palette-scrim { position: fixed; inset: 0; background: rgba(6,7,9,0.66);
    display: flex; align-items: flex-start; justify-content: center; padding-top: 14vh; z-index: 50; }
  .palette { width: min(560px, 92vw); background: #1a1d23; border: 1px solid var(--bd-2);
    border-radius: 14px; box-shadow: 0 30px 80px -10px rgba(0,0,0,0.7); overflow: hidden;
    animation: pop .16s ease; }
  @keyframes pop { from { transform: translateY(-7px) scale(.99); } }
  .palette-search { display: flex; align-items: center; gap: 11px; padding: 16px 18px; border-bottom: 1px solid var(--bd); }
  .palette-search input { flex: 1; background: none; border: none; outline: none; color: var(--tx);
    font-family: inherit; font-size: 16px; }
  .palette-search input::placeholder { color: var(--tx-3); }
  .palette-list { max-height: 340px; padding: 8px; }
  .pglabel { font-size: 10.5px; text-transform: uppercase; letter-spacing: .09em; color: var(--tx-3);
    padding: 10px 10px 5px; font-weight: 600; }
  .pitem { display: flex; align-items: center; gap: 12px; width: 100%; background: none; border: none;
    border-radius: 8px; padding: 9px 10px; cursor: pointer; color: var(--tx-2); text-align: left; }
  .pitem:hover, .pitem.on { background: var(--accent-soft); color: var(--tx); }
  .pitem.on .navicon, .pitem:hover .navicon { color: var(--accent); }
  .pname { flex: 1; font-size: 14px; font-weight: 500; color: var(--tx); }
  .palette-foot { display: flex; gap: 16px; padding: 10px 18px; border-top: 1px solid var(--bd);
    font-size: 11px; color: var(--tx-3); }
  .palette-foot span { display: inline-flex; align-items: center; gap: 5px; }
  .palette-foot svg { width: 13px; height: 13px; }

  .caption { font-family: var(--mono); font-size: 12px; color: var(--tx-3); }
  .caption b { color: var(--tx-2); font-weight: 500; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#0a0b0d" />
    <g fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 38V32a4 4 0 0 1 4-4h6M60 28h6a4 4 0 0 1 4 4v6M70 62v6a4 4 0 0 1-4 4h-6M40 72h-6a4 4 0 0 1-4-4v-6" />
      <rect x="42" y="42" width="16" height="16" rx="2" />
    </g>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="devtools-ui.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#3b82f6",
  "tree": "rows",
  "copyMode": "always",
  "density": "comfortable",
  "sidebar": "compact",
  "premium": false,
  "palette": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState("protobuf");
  const [selMap, setSelMap] = useState({});
  const [paletteOpen, setPaletteOpen] = useState(false);
  const onSel = (id, k) => setSelMap((m) => ({ ...m, [id]: k }));

  // keep palette state in sync with tweak + keyboard
  useEffect(() => { setPaletteOpen(t.palette); }, [t.palette]);
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setPaletteOpen((o) => !o); }
      if (e.key === "Escape") setPaletteOpen(false);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  return (
    <div className="app" data-density={t.density} data-copy={t.copyMode}
      style={{ "--accent": t.accent }}>
      <div className="window">
        <div className="titlebar">
          <div className="lights"><i /><i /><i /></div>
          <div className="title">DevTools</div>
          <div />
        </div>
        <div className="body">
          <Sidebar active={active} onPick={setActive} mode={t.sidebar} premium={t.premium} />
          <div className="main">
            <ToolHeader premium={t.premium} onPalette={() => setPaletteOpen(true)} />
            <div className="workspace">
              <InputPanel copyMode={t.copyMode} />
              <div className="divider"><span /></div>
              <Decoded tree={t.tree} selMap={selMap} onSel={onSel} copyMode={t.copyMode} />
            </div>
            <StatusBar premium={t.premium} />
          </div>
        </div>
      </div>
      <div className="caption">DevTools — <b>Protobuf decoder</b>, the hero tool · v1 shell</div>

      <Palette open={paletteOpen} onClose={() => setPaletteOpen(false)} />

      <TweaksPanel>
        <TweakSection label="Accent" />
        <TweakColor label="Accent color" value={t.accent}
          options={["#3b82f6", "#64748b", "#10b981", "#8b5cf6", "#e0a42b"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakSection label="Decoded view" />
        <TweakRadio label="Tree style" value={t.tree} options={["cards", "rows", "json"]}
          onChange={(v) => setTweak("tree", v)} />
        <TweakRadio label="Copy action" value={t.copyMode} options={["hover", "always", "inline"]}
          onChange={(v) => setTweak("copyMode", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={["comfortable", "compact"]}
          onChange={(v) => setTweak("density", v)} />
        <TweakRadio label="Sidebar" value={t.sidebar} options={["full", "compact", "icons"]}
          onChange={(v) => setTweak("sidebar", v)} />
        <TweakSection label="Extras" />
        <TweakToggle label="Command palette (⌘K)" value={t.palette}
          onChange={(v) => setTweak("palette", v)} />
        <TweakToggle label="Premium tier preview" value={t.premium}
          onChange={(v) => setTweak("premium", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
