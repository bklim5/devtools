# Pre-commit UNIT gate (D-07 / HRN-03) — runs on every `git commit`.
# Enforces the mechanical half of the per-task Definition of Done so no commit
# lands with broken types, lint errors, or failing tests, regardless of agent
# discipline.
#
# Install / refresh the git hook:  pnpm lefthook install
# (the `lefthook` package + the `prepare: lefthook install` script are already in
#  package.json from Plan 01 — this file only configures the hook.)
#
# D-08 — SCOPE OF THIS GATE: lefthook covers the UNIT gate ONLY.
# The other two gates in the binding harness stay MANUAL per-task DoD steps,
# because a git hook cannot run them:
#   • /codex:review  — disable-model-invocation; must be invoked by the agent
#   • real-webview UI verification — needs the running app (tauri dev / WKWebView)
# Do NOT try to wire those into lefthook.
pre-commit:
  parallel: true
  commands:
    typecheck:
      # Root config has `include:["src"]` and runs WITHOUT `--build`, so a project
      # `reference` to server/webhook is NOT walked. The server/ backend (D-56)
      # therefore needs its OWN explicit typecheck invocation in the gate command.
      run: pnpm tsc --noEmit && pnpm tsc --noEmit -p server/webhook/tsconfig.json
    test:
      run: pnpm vitest run
    lint:
      run: pnpm lint

# Rust licensing-core gate (Phase 19, research Open Question 2 decision):
# `cargo test` runs on pre-PUSH, not pre-commit, to keep commit latency sane
# (a cold cargo build would dominate every commit). Per-task DoD still runs
# `cargo test --manifest-path src-tauri/Cargo.toml` explicitly for Rust tasks.
pre-push:
  commands:
    cargo-test:
      run: cargo test --quiet --manifest-path src-tauri/Cargo.toml

